name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s automation/plan_orchestrator/tests -t .

      - name: Smoke test example playbook
        run: |
          python automation/run_plan_orchestrator.py list-items --playbook examples/basic_markdown_playbook/playbook.md
          python automation/run_plan_orchestrator.py show-item --playbook examples/basic_markdown_playbook/playbook.md --item 02 --format json

